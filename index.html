<!DOCTYPE html>
<html lang="ka">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1P900RJ6DJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-1P900RJ6DJ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TILO.LIFE - სიახლეების პორტალი</title>

    <!-- Open Graph / Discord Previews -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tilo.life/">
    <meta property="og:title" content="TILO.LIFE - სიახლეების პორტალი">
    <meta property="og:description" content="გაიგეთ უახლესი ამბები, ითამაშეთ და დააგროვეთ ქოინები თილოს სამყაროში!">
    <meta property="og:image"
        content="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=1200">
    <meta name="theme-color" content="#0066cc">
    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="news.css">
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="ratings.css">
    <link rel="stylesheet" href="home-redesign.css">
    <script src="security.js"></script>
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5131926411609590"
        crossorigin="anonymous"></script>
</head>

<body class="news-portal dark-mode">
    <div id="game-bg-layer"></div>
    <div id="tilo-cloth"></div>

    <div class="home-hero-container">
        <div class="y-menu">
            <svg class="y-shape-svg" viewBox="0 0 600 600">
                <!-- Bottom Center to Hub -->
                <line class="y-line" x1="300" y2="300" x2="300" y1="600" />
                <!-- Hub to Top Left -->
                <line class="y-line" x1="300" y1="300" x2="100" y2="100" />
                <!-- Hub to Top Right -->
                <line class="y-line" x1="300" y1="300" x2="500" y2="100" />
            </svg>
            <div class="y-center"></div>

            <div class="menu-item top" onmouseenter="handleAbuseHover()" onmouseleave="handleAbuseLeave()">
                <div id="abuse-preview-container" class="abuse-preview-container"></div>
                <span class="label">ადმინ აბუსი</span>
                <span class="sub-label">ADMIN ABUSE</span>
            </div>

            <div class="menu-item left" onclick="handleMenuClick('roblox')">
                <span class="label">მაისური</span>
                <span class="sub-label" style="color: #ff3d00;">ROBLOX</span>
            </div>

            <div class="menu-item right" onclick="handleMenuClick('game')">
                <span class="label">ტილოს</span>
                <span class="sub-label" style="color: #00e5ff;">თამაში</span>
            </div>
        </div>
    </div>

    <!-- Hidden containers needed for portal.js to not error out if it looks for them -->
    <div id="news-grid" class="hidden"></div>
    <div id="pagination-container" class="hidden"></div>
    <div id="news-detail" class="hidden"><div id="detail-content"></div></div>
    <div id="sidebar-abuse-list" class="hidden"></div>
    <div id="chat-messages" class="hidden"></div>
    <input type="text" id="chat-input" class="hidden">
    <button id="send-chat-btn" class="hidden"></button>

    <!-- Simplified Footer with only counters -->
    <footer class="news-footer" style="padding: 10px; background: transparent; border: none; margin-top: auto;">
        <div class="footer-container" style="display: flex; justify-content: center; gap: 20px; align-items: center;">
            <div class="footer-counters" style="display: flex; align-items: center; gap: 15px;">
                <!-- TOP.GE ASYNC COUNTER CODE -->
                <div id="top-ge-counter-container" data-site-id="118538"></div>
                <script async src="//counter.top.ge/counter.js"></script>
                <!-- / END OF TOP.GE COUNTER CODE -->

                <!-- WAUST.AT COUNTER CODE -->
                <script id="_wau3mz">var _wau = _wau || []; _wau.push(["dynamic", "rcj6goig4h", "3mz", "c4302bffffff", "small"]);</script>
                <script async src="//waust.at/d.js"></script>
                <!-- / END OF WAUST.AT COUNTER CODE -->
            </div>
        </div>
    </footer>

    <!-- Video Notification Popup -->
    <div id="video-notification" class="hidden"
        style="position: fixed; top: 100px; left: 20px; width: 280px; background: rgba(16, 16, 30, 0.95); border: 2px solid cyan; border-radius: 12px; padding: 12px; z-index: 10000; box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); backdrop-filter: blur(5px); transform: translateX(-150%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <h3 style="margin: 0; color: cyan; font-size: 0.9rem;">✨ ახალი ვიდეო!</h3>
            <button onclick="hideVideoPopup()"
                style="background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer;">&times;</button>
        </div>

        <div onclick="watchVideoHere(event)"
            style="position: relative; overflow: hidden; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; cursor: pointer;">
            <img id="video-thumb" src="" alt="Thumbnail"
                style="width: 100%; height: auto; display: block; filter: brightness(0.8);">
            <div
                style="position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;">
                <div
                    style="width: 40px; height: 40px; background: rgba(255,0,0,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    ▶️</div>
            </div>
        </div>
        <div id="video-notif-title"
            style="font-size: 0.8rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: white;">
            Loading...</div>

        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <button id="btn-watch-here" onclick="watchVideoHere(event)"
                style="flex: 1; background: rgba(0, 255, 255, 0.2); color: cyan; border: 1px solid cyan; border-radius: 5px; cursor: pointer; padding: 6px; font-weight: bold; font-size: 0.75rem;">ვუყურებ
                👁️</button>
            <a id="btn-youtube" href="#" target="_blank"
                style="flex: 1; display: flex; align-items: center; justify-content: center; background: rgba(255, 0, 0, 0.8); color: white; border: none; border-radius: 5px; text-decoration: none; font-size: 0.75rem; padding: 6px; font-weight: bold;">YouTube
                ↗️</a>
        </div>
    </div>

    <!-- Mini Video Player -->
    <div id="video-player-modal" class="hidden"
        style="position: fixed; bottom: 80px; right: 20px; width: 380px; max-width: 90vw; z-index: 20000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); background: black; border: 2px solid cyan; border-radius: 12px; overflow: visible; display: flex; flex-direction: column;">
        <div id="video-player-handle"
            style="height: 30px; background: rgba(0,0,0,0.9); cursor: move; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; border-bottom: 1px solid rgba(0,255,255,0.3); border-top-left-radius: 10px; border-top-right-radius: 10px;">
            <span style="font-size: 0.7rem; color: cyan; font-weight: bold;">📺 TILO VIDEO PLAYER</span>
            <button onclick="closeVideoPlayer()"
                style="background: rgba(255,0,0,0.8); color: white; border: none; width: 20px; height: 20px; border-radius: 4px; cursor: pointer;">&times;</button>
        </div>
        <div style="position: relative; padding-bottom: 56.25%; height: 0;">
            <iframe id="video-iframe" src=""
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script type="module" src="portal.js"></script>
    <script src="home-game.js"></script>
</body>
</html>
